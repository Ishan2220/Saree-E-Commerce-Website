<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&amp;display=swap');
            .text-main { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; fill: #3A2F28; }
            .text-sub { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 600; fill: #D4A373; letter-spacing: 5px; text-transform: uppercase; }
            .monogram-text { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; fill: #D4A373; }
        </style>
    </defs>
    
    <!-- Monogram Icon KS (Stylized) -->
    <g transform="translate(60, 60)">
        <!-- Elegant diamond/rhombus outline -->
        <path d="M 0 -35 L 35 0 L 0 35 L -35 0 Z" fill="none" stroke="#D4A373" stroke-width="2"/>
        <path d="M 0 -28 L 28 0 L 0 28 L -28 0 Z" fill="none" stroke="#3A2F28" stroke-width="1" opacity="0.4"/>
        
        <!-- KS monogram inside -->
        <text x="0" y="16" class="monogram-text" text-anchor="middle">K</text>
    </g>
    
    <!-- Text -->
    <text x="125" y="62" class="text-main">Kangan Sarees</text>
    <text x="128" y="90" class="text-sub">Authentic Luxury</text>

    <!-- Decorative Line -->
    <line x1="125" y1="72" x2="360" y2="72" stroke="#D4A373" stroke-width="1" opacity="0.4"/>
</svg>
